name: Deploy Dijkstra Algorithm Site

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with CMake and Emscripten
        run: |
          source emsdk/emsdk_env.sh
          mkdir build_wasm
          cd build_wasm
          emcmake cmake .. -DEMSCRIPTEN=ON
          make -j$(nproc)

      - name: Prepare artifacts
        run: |
          mkdir public
          cp web/index.html public/
          cp build_wasm/CSE373-Adaptive-City-Routing.js public/
          cp build_wasm/CSE373-Adaptive-City-Routing.wasm public/
          # Only copy .data if it exists (it might not if assets are empty)
          if [ -f build_wasm/CSE373-Adaptive-City-Routing.data ]; then
            cp build_wasm/CSE373-Adaptive-City-Routing.data public/
          fi
          touch public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
