<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Adaptive City Routing - Dijkstra Algorithm</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        margin: 0;
        background-color: #111114;
        color: #eee;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
      }
      #status {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        background: rgba(17, 17, 20, 0.8);
        padding: 20px;
        border-radius: 10px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 15px;
        border: 4px solid #333;
        border-top: 4px solid #11a3eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      canvas.emscripten {
        border: none;
        outline: none;
        background-color: #111114;
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="status">
      <div class="spinner"></div>
      <div id="status-text">Initializing Engine...</div>
    </div>
    
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <script type='text/javascript'>
      var statusElement = document.getElementById('status-text');
      var statusContainer = document.getElementById('status');

      var Module = {
        preRun: [],
        postRun: [
            function() {
                // Hide loading screen when app starts
                statusContainer.style.display = 'none';
            }
        ],
        print: (function() {
          return function(text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.log(text);
          };
        })(),
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) { 
            alert('WebGL context lost. Please reload the page.'); 
            e.preventDefault(); 
          }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing Assets... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'Starting Application...');
        }
      };
      
      Module.setStatus('Downloading contents...');
      
      window.onerror = function() {
        Module.setStatus('An error occurred. Check console for details.');
        statusContainer.style.display = 'block';
        document.querySelector('.spinner').style.display = 'none';
      };
    </script>
    <script async type="text/javascript" src="dijkstra-algorithm.js"></script>
  </body>
</html>
